# AIKEY-l4qkxonqry2b4gj7bsrkqpryiy
---
name: Rotate AI Submission Key

on: # yamllint disable-line rule:truthy
  workflow_dispatch: null
  workflow_call: null

permissions:
  contents: write

jobs:
  rotate-key:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
      - name: Build inject-key
        run: cargo build --release -p inject-key
      - name: Rotate AI submission key
        run: ./target/release/inject-key --rotate
      - name: Commit rotated key
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add key.agents_.md
          git diff --cached --quiet || git commit -m "chore: rotate AI submission key"
      - name: Push rotation commit
        run: git push
