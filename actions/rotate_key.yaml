---
name: Rotate AI Submission Key

# This workflow rotates the AI submission key in key.agents_.md and commits
# the result.  Run it before starting a new agent task session to prevent
# pre-loaded or training-data keys from passing the CI check.
#
# Trigger options:
#   workflow_dispatch  — manual "Run workflow" button in the GitHub UI
#   workflow_call      — called from another workflow (e.g. a task-dispatch pipeline)
#   schedule           — uncomment and set a cron expression to rotate on a schedule
#
# The GITHUB_TOKEN needs write access to push the rotation commit.

on: # yamllint disable-line rule:truthy
  workflow_dispatch: null
  workflow_call: null
  # schedule:
  #   - cron: '0 3 * * 1'  # every Monday at 03:00 UTC — adjust as needed

permissions:
  contents: write

jobs:
  rotate-key:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # persist-credentials required so the subsequent push works with
          # the default GITHUB_TOKEN.
          persist-credentials: true
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Rotate AI submission key
        run: go run ./tools/inject_key -rotate
      - name: Commit rotated key
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add key.agents_.md
          # Only commit if the file actually changed (idempotent on no-op runs).
          git diff --cached --quiet || git commit -m "chore: rotate AI submission key"
      - name: Push rotation commit
        run: git push
